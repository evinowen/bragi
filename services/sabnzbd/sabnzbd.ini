# SABnzbd Configuration
# This is a basic configuration file with sensible defaults
# Users should configure their Usenet providers through the web interface

[misc]
# Basic settings
host = 0.0.0.0
port = 8080
web_dir = Glitter
web_dir2 =
username =
password =
api_key =
nzb_key =

# Directories - these will be set by the container
download_dir = /downloads
complete_dir = /downloads
incomplete_dir = /incomplete-downloads
admin_dir = admin
dirscan_dir =
script_dir =

# Performance settings
max_art_tries = 3
max_art_opt = 1
pause_on_pwrar = 1
action_on_unwanted_extensions = 0
unwanted_extensions =
new_nzb_on_failure = 0
replace_spaces = 0
replace_dots = 0
safe_postproc = 1
pause_on_post_processing = 0
ignore_samples = 0
enable_recursive = 1
flat_unpack = 0
par_option = 0
nice =
ionice =
fail_hopeless = 1
fast_fail = 1
auto_browser = 0
enable_https_verification = 1

# Download settings
bandwidth_max =
bandwidth_perc = 0
cache_limitstr =
article_cache_max = 200M
quota_size =
quota_day =
quota_resume = 0
quota_period = m

# Post-processing
download_free = 5G
complete_free =
script_can_fail = 0
enable_unzip = 1
enable_unrar = 1
enable_filejoin = 1
enable_tsjoin = 0
overwrite_files = 0
ignore_unrar_dates = 0
backup_for_duplicates = 1
empty_postproc = 0
process_unpacked_par2 = 1
enable_par_cleanup = 1
nice_ionice = 0
par2_multicore = 1
enable_all_par = 0
enable_recursive = 1
top_only = 0
keep_awake = 1

# Logging
log_level = 1
max_log_size = 5242880
log_backups = 5
enable_cherrypy_logging = 0

# Special settings
folder_rename = 1
replace_illegal = 1
sanitize_safe = 0
cleanup_list = ,
unwanted_extensions =
action_on_unwanted_extensions = 0
new_nzb_on_failure = 0
sfv_check = 1
script_can_fail = 0
enable_meta = 1
no_dupes = 0
no_series_dupes = 0
dupekey =
series_propercheck = 1
req_completion_rate = 100.2

[servers]
# Servers will be configured through the web interface

[categories]
[[*]]
name = *
order = 0
pp = 3
script = None
dir =
priority = 0
newzbin =

[[tv]]
name = tv
order = 1
pp = 3
script = None
dir =
priority = 0
newzbin =

[[movies]]
name = movies
order = 2
pp = 3
script = None
dir =
priority = 0
newzbin =

[[software]]
name = software
order = 3
pp = 3
script = None
dir =
priority = -1
newzbin =

[[audio]]
name = audio
order = 4
pp = 3
script = None
dir =
priority = -1
newzbin =

[switches]
# Feature switches
create_group_folders = 0
enable_https = 0
https_port = 9090
https_cert = server.cert
https_key = server.key
enable_bonjour = 1
disable_api_key = 0
api_warnings = 1
helpful_warnings = 1
check_new_rel = 1
auto_disconnect = 1
enable_date_sorting = 0
enable_tv_sorting = 0
enable_movie_sorting = 0
enable_series_sorting = 0
tv_sort_string =
movie_sort_string =
tv_categories = tv,
movie_categories = movies,
series_categories = tv,
